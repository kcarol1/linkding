{% extends 'shared/layout.html' %}
{% load i18n %}
{% block head %}
  {% trans "New bookmark - Linkding" as page_title %}{{ block.super }}
{% endblock %}
{% block content %}
  <div class="bookmarks-form-page">
    <main aria-labelledby="main-heading">
      <div class="section-header">
        <h1 id="main-heading">{% trans "New bookmark" %}</h1>
      </div>
      <ld-form data-submit-on-ctrl-enter>
        <form action="{% url 'linkding:bookmarks.new' %}" method="post" novalidate>
          {% include 'bookmarks/form.html' %}
        </form>
      </ld-form>
    </main>
  </div>
{% endblock %}
